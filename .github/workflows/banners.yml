name: Generate Banners

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # ~55 repos × ~8 Search API queries each, throttled to 24/min by the
    # collector — comfortably under the 30/min authenticated ceiling. Cap
    # the job at 60 min so a stuck run doesn't hold the runner forever.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate banners for every visible repo in jellyfin + jellyfin-labs
        env:
          # The job-scoped GITHUB_TOKEN bumps the Search API quota from
          # 10/min (unauthenticated) to 30/min, and grants write access
          # back to this repo for the commit step below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py --output-dir banners/

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banners/
          if git diff --cached --quiet; then
            echo "No banner changes — nothing to commit."
            exit 0
          fi
          git commit -m "Regenerate banners ($(date -u +%Y-%m-%d))"
          git push
